{% extends 'base.html' %}
{% load static %}

{% block title %}Forgot Password{% endblock %}

{% block content %}

<!-- Forgot Password Section -->
<div class="section after-banner">
    <div class="container">
        <div class="authentication-content-enhanced">
            
            <!-- Decorative Elements -->
            <div class="auth-decoration-top"></div>
            <div class="auth-decoration-bottom"></div>
            
            <!-- Main Content Card -->
            <div class="auth-card-elevated">
                
                <!-- Logo with Animation -->


                <!-- Icon Illustration -->
                <div class="auth-icon-wrapper">
                    <div class="auth-icon-circle">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                            <path d="M8 11V7a4 4 0 118 0v4"/>
                        </svg>
                    </div>
                </div>

                <!-- Title Section -->
                <div class="sign-in-form-content-wrap auth-header-enhanced">
                    <h2 class="sign-in-title auth-title-enhanced">Reset Your Password</h2>
                    <p class="alternative-details reset auth-subtitle-enhanced">
                        Enter your email address and we'll send you a link to reset your password.
                    </p>
                </div>



                <!-- Forgot Password Form -->
                <form method="post" class="sign-in-form-wrap auth-form-enhanced">
                    {% csrf_token %}
                    
                    <div class="sign-in-single-fields">
                        <!-- Email Field -->
                        <div class="sign-in-single-field-wrap auth-field-enhanced">
                            <label for="email" class="sign-in-field-label auth-label-enhanced">
                                Email Address
                            </label>
                            <div class="auth-input-wrapper">
                                <div class="auth-input-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                        <polyline points="22,6 12,13 2,6"/>
                                    </svg>
                                </div>
                                <input 
                                    type="email" 
                                    class="sign-in-field auth-field-input" 
                                    maxlength="256" 
                                    name="email" 
                                    placeholder="your.email@example.com" 
                                    id="email" 
                                    required
                                >
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="sign-in-single-field-wrap mb-0">
                            <button type="submit" class="sign-in-submit-button auth-button-enhanced w-button">
                                <span class="button-text">Send Reset Link</span>
                                <span class="button-icon">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="5" y1="12" x2="19" y2="12"/>
                                        <polyline points="12 5 19 12 12 19"/>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </div>
                </form>

                <!-- Divider -->
                <div class="auth-divider">
                    <span class="auth-divider-line"></span>
                </div>

                <!-- Back to Login -->
                <div class="alternative-details auth-footer-enhanced">
                    <span class="auth-footer-text">Remember your password?</span>
                    <a href="{% url 'login' %}" class="alternative-link auth-footer-link">
                        Back to Login
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<style>
/* Enhanced Authentication Layout */
.authentication-content-enhanced {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 600px;
    padding: 10px 10px;
}

/* Decorative Elements */
.auth-decoration-top,
.auth-decoration-bottom {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
}

.auth-decoration-top {
    top: -100px;
    right: -100px;
    background: #000;
}

.auth-decoration-bottom {
    bottom: -100px;
    left: -100px;
    background: #000;
}

/* Main Card */
.auth-card-elevated {
    position: relative;
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 24px;
    padding: 50px 40px;
    box-shadow: 
        0 0 0 1px rgba(0, 0, 0, 0.04),
        0 10px 30px -5px rgba(0, 0, 0, 0.08),
        0 20px 50px -10px rgba(0, 0, 0, 0.06);
    z-index: 1;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.auth-card-elevated:hover {
    box-shadow: 
        0 0 0 1px rgba(0, 0, 0, 0.06),
        0 15px 40px -5px rgba(0, 0, 0, 0.12),
        0 30px 60px -10px rgba(0, 0, 0, 0.1);
    transform: translateY(-5px);
}

/* Logo */
.auth-logo-wrapper {
    position: relative;
    display: flex;
    justify-content: center;
    margin-bottom: 35px;
}

.logo-glow-effect {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 120px;
    height: 120px;
    background: rgba(0, 0, 0, 0.02);
    border-radius: 50%;
    filter: blur(30px);
    animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
}

.auth-logo {
    position: relative;
    z-index: 1;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    height: 40px;
}

.auth-logo-wrapper:hover .auth-logo {
    transform: scale(1.05);
}

/* Icon Illustration */
.auth-icon-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 30px;
}

.auth-icon-circle {
    position: relative;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f8f9fa;
    border-radius: 20px;
    color: #1a1a1a;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.auth-icon-circle::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, #000 0%, #333 100%);
    border-radius: 22px;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: -1;
}

.auth-card-elevated:hover .auth-icon-circle {
    transform: translateY(-5px) rotate(5deg);
}

.auth-card-elevated:hover .auth-icon-circle::before {
    opacity: 0.1;
}

/* Header */
.auth-header-enhanced {
    text-align: center;
    margin-bottom: 35px;
}

.auth-title-enhanced {
    font-size: 28px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
}

.auth-subtitle-enhanced {
    font-size: 15px;
    line-height: 1.6;
    color: #666;
    max-width: 380px;
    margin: 0 auto;
}
@media (max-width: 480px) {
    .auth-card-elevated {
        max-width: 100%;
        padding: 24px 18px;
        border-radius: 16px;
    }
}

html, body {
    max-width: 100%;
    overflow-x: hidden;
}


/* Form */
.auth-form-enhanced {
    margin-bottom: 30px;
}

.auth-field-enhanced {
    margin-bottom: 24px;
}

.auth-label-enhanced {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 10px;
    letter-spacing: -0.2px;
}

.auth-input-wrapper {
    position: relative;
}

.auth-input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
    transition: color 0.3s;
    pointer-events: none;
    z-index: 1;
}

.auth-field-input {
    width: 100%;
    padding: 14px 16px 14px 48px;
    font-size: 15px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    background: #fff;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    outline: none;
}

.auth-field-input:focus {
    border-color: #1a1a1a;
    background: #fafafa;
    box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.04);
}

.auth-field-input:focus + .auth-input-icon,
.auth-input-wrapper:hover .auth-input-icon {
    color: #1a1a1a;
}

.auth-field-input::placeholder {
    color: #aaa;
}

/* Button */
.auth-button-enhanced {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 600;
    background: #1a1a1a;
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
}

.auth-button-enhanced::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: left 0.6s;
}

.auth-button-enhanced:hover {
    background: #000;
    transform: translateY(-2px);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
}

.auth-button-enhanced:hover::before {
    left: 100%;
}

.auth-button-enhanced:active {
    transform: translateY(0);
}

.button-icon {
    display: flex;
    align-items: center;
    transition: transform 0.3s;
}

.auth-button-enhanced:hover .button-icon {
    transform: translateX(4px);
}

/* Divider */
.auth-divider {
    position: relative;
    margin: 30px 0;
    text-align: center;
}

.auth-divider-line {
    display: block;
    height: 1px;
    background: #e5e7eb;
}

/* Footer */
.auth-footer-enhanced {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    text-align: center;
}

.auth-footer-text {
    font-size: 15px;
    color: #666;
}

.auth-footer-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 15px;
    font-weight: 600;
    color: #1a1a1a;
    text-decoration: none;
    transition: all 0.3s;
    padding: 4px 8px;
    border-radius: 6px;
}

.auth-footer-link:hover {
    background: #f5f5f5;
    gap: 8px;
}

.auth-footer-link svg {
    transition: transform 0.3s;
}

.auth-footer-link:hover svg {
    transform: translateX(2px);
}

/* Responsive */
@media (max-width: 768px) {
    .authentication-content-enhanced {
        padding: 40px 15px;
    }

    .auth-card-elevated {
        padding: 40px 30px;
        border-radius: 20px;
    }

    .auth-title-enhanced {
        font-size: 24px;
    }

    .auth-subtitle-enhanced {
        font-size: 14px;
    }

    .auth-icon-circle {
        width: 70px;
        height: 70px;
    }

    .auth-icon-circle svg {
        width: 40px;
        height: 40px;
    }
}

@media (max-width: 480px) {
    .auth-card-elevated {
        padding: 35px 25px;
    }

    .auth-title-enhanced {
        font-size: 22px;
    }
}
</style>

{% endblock %}
